<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <!-- Prevenir que el navegador guarde esta página en caché de historial -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factura de Compra - RD Watch</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer">
    <style>
        .factura-container {
            max-width: 900px;
            margin: 100px auto 50px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            padding: 40px;
        }

        .factura-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--primary-color);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .factura-logo h1 {
            color: var(--primary-color);
            font-size: 2rem;
            margin: 0;
        }

        .factura-info {
            text-align: right;
        }

        .factura-info h2 {
            margin: 0;
            color: var(--text-dark);
            font-size: 1.5rem;
        }

        .factura-numero {
            color: var(--primary-color);
            font-weight: bold;
        }

        .info-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .info-box h3 {
            color: var(--primary-color);
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .info-box p {
            margin: 5px 0;
            color: var(--text-dark);
        }

        .productos-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 30px;
        }

        .productos-table thead {
            background: var(--primary-color);
            color: white;
        }

        .productos-table th,
        .productos-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .productos-table th {
            font-weight: 600;
        }

        .productos-table tbody tr:hover {
            background: #f9f9f9;
        }

        .text-right {
            text-align: right;
        }

        .totales-box {
            margin-left: auto;
            width: 300px;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .totales-box .total-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1rem;
        }

        .totales-box .total-final {
            border-top: 2px solid var(--primary-color);
            padding-top: 10px;
            margin-top: 10px;
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .nota-cliente {
            background: linear-gradient(135deg, #fdf8ee 0%, #f9f2dc 100%);
            border: 1px solid var(--primary-color);
            border-left: 5px solid var(--primary-color);
            border-radius: 10px;
            padding: 28px 32px;
            margin: 30px 0;
        }

        .nota-cliente h3 {
            color: var(--primary-color);
            margin: 0 0 12px 0;
            font-size: 1.15rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nota-cliente p {
            margin: 0;
            color: #444;
            line-height: 1.7;
            font-size: 0.97rem;
        }

        .nota-cliente .contacto-urgente {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin-top: 14px;
            background: var(--primary-color);
            color: white;
            padding: 7px 16px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .alert-estado {
            background: #fff8e1;
            border-left: 4px solid #ffc107;
            padding: 12px 18px;
            margin: 0 0 20px 0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.95rem;
            color: #7a5c00;
            font-weight: 500;
        }

        .acciones-factura {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-factura {
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .btn-imprimir {
            background: var(--primary-color);
            color: white;
        }

        .btn-imprimir:hover {
            background: #9b7a0d;
        }

        .btn-volver {
            background: #6c757d;
            color: white;
        }

        .btn-volver:hover {
            background: #5a6268;
        }

        @media print {

            .acciones-factura,
            .header,
            .btn-factura {
                display: none !important;
            }

            .factura-container {
                box-shadow: none;
                margin: 0;
            }
        }

        .loading-spinner {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header class="header header--solid">
        <div class="container header-container">
            <div class="header-logo">
                <a href="../index.html"><i class="fas fa-clock logo-icon"></i> <span>Relojería</span> Durán</a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html#services-section" class="nav-link">Servicios</a></li>
                    <li><a href="../index.html#about-us-section" class="nav-link">Sobre Nosotros</a></li>
                    <li><a href="../index.html#reviews-section" class="nav-link">Reseñas</a></li>
                    <li><a href="../index.html#gallery-section" class="nav-link">Galería</a></li>
                    <li><a href="comercio.html" class="nav-link">Comercio</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button id="login-btn" class="button button-secondary"><i class="fas fa-user"></i> Mi Cuenta</button>
                <a href="../index.html#contact-section" class="button button-primary"><i class="fas fa-phone-alt"></i>
                    Contacto</a>
            </div>
            <button class="mobile-menu-btn" aria-label="Menú móvil">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- Contenedor de Factura -->
    <div class="factura-container" id="factura-container">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i><br>
            Cargando factura...
        </div>
    </div>

    <!-- Template de Factura (se llenará con JavaScript) -->
    <template id="factura-template">
        <div class="factura-header">
            <div class="factura-logo">
                <h1><i class="fas fa-clock"></i> RD Watch</h1>
                <p>Relojes de Calidad</p>
            </div>
            <div class="factura-info">
                <h2>FACTURA</h2>
                <p>No. <span class="factura-numero" id="num-factura">---</span></p>
                <p id="fecha-emision">---</p>
            </div>
        </div>

        <div class="info-section">
            <div class="info-box">
                <h3><i class="fas fa-user"></i> Datos del Cliente</h3>
                <p><strong>Nombre:</strong> <span id="cliente-nombre">---</span></p>
                <p><strong>Email:</strong> <span id="cliente-email">---</span></p>
                <p><strong>Teléfono:</strong> <span id="cliente-telefono">---</span></p>
                <p><strong>Dirección de Envío:</strong> <span id="cliente-direccion">---</span></p>
            </div>
            <div class="info-box">
                <h3><i class="fas fa-info-circle"></i> Información de la Orden</h3>
                <p><strong>Orden No.:</strong> <span id="orden-numero">---</span></p>
                <p><strong>Estado:</strong> <span id="orden-estado">---</span></p>
                <p><strong>Fecha:</strong> <span id="orden-fecha">---</span></p>
            </div>
        </div>

        <h3><i class="fas fa-shopping-cart"></i> Productos</h3>
        <table class="productos-table">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th class="text-right">Cantidad</th>
                    <th class="text-right">Precio Unit.</th>
                    <th class="text-right">Subtotal</th>
                </tr>
            </thead>
            <tbody id="productos-tbody">
                <!-- Se llenará con JavaScript -->
            </tbody>
        </table>

        <div class="totales-box">
            <div class="total-row">
                <span>Subtotal:</span>
                <span id="total-subtotal">$0</span>
            </div>
            <div class="total-row">
                <span>Envío:</span>
                <span id="total-envio">$15,000</span>
            </div>
            <div class="total-row total-final">
                <span>TOTAL:</span>
                <span id="total-final">$0</span>
            </div>
        </div>

        <div class="nota-cliente">
            <h3><i class="fas fa-handshake"></i> Gracias por su compra</h3>
            <p>
                Hemos recibido su pedido correctamente y nos encontramos en proceso de verificación del pago.
                En breve, uno de nuestros asesores se comunicará con usted para confirmar su orden y coordinar
                los detalles del envío.
            </p>
            <p style="margin-top: 10px;">
                Si requiere atención prioritaria o desea hacer seguimiento inmediato a su pedido,
                no dude en contactarnos directamente:
            </p>
            <span class="contacto-urgente" style="cursor: default; user-select: none;">
                <i class="fas fa-phone-alt"></i> +57 311 546 0069
            </span>
        </div>

        <div class="acciones-factura">
            <button class="btn-factura btn-imprimir" onclick="window.print()">
                <i class="fas fa-print"></i> Imprimir Factura
            </button>
            <button class="btn-factura btn-volver" onclick="window.location.href='user/user.html'">
                <i class="fas fa-arrow-left"></i> Ir a Mi Cuenta
            </button>
        </div>
    </template>

    <footer class="footer">
        <div class="container footer-grid" style="display:flex; justify-content:center; text-align:center;">
            <div class="footer-col footer-brand" style="max-width: 600px;">
                <a href="../index.html" class="footer-logo" style="justify-content:center;">
                    <i class="fas fa-clock logo-icon"></i>
                    <span>Relojería</span> DURÁN
                </a>
                <div class="footer-legal-links"
                    style="display: flex; gap: 20px; justify-content: center; margin-top: 15px;">
                    <a href="politica-privacidad.html">Política de cookies</a>
                    <a href="politica-privacidad.html">Política de privacidad</a>
                    <a href="aviso-legal.html">Aviso legal</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/security.js"></script>
    <script src="js/script.js"></script>
    <script src="js/factura.js"></script>
</body>
