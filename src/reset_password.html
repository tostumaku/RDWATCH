<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restablecer Contraseña - Relojería Durán</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reset-container {
            max-width: 450px;
            margin: 100px auto;
            padding: 40px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header i {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }

        .input-block {
            margin-bottom: 20px;
        }

        .input-block label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-block input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .btn-reset {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-reset:hover {
            background: var(--primary-dark);
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 6px;
            color: #fff;
            display: none;
            z-index: 1000;
        }

        .notification.success {
            background: #2ecc71;
            display: block;
        }

        .notification.error {
            background: #e74c3c;
            display: block;
        }
    </style>
</head>

<body>
    <div id="notification" class="notification"></div>

    <div class="reset-container">
        <div class="reset-header">
            <i class="fas fa-key"></i>
            <h1>Restablecer Contraseña</h1>
            <p>Ingresa tu nueva contraseña para acceder a tu cuenta.</p>
        </div>

        <form id="resetPasswordForm">
            <div class="input-block">
                <label for="new-password">Nueva Contraseña</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>
            <div class="input-block">
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-reset">ACTUALIZAR CONTRASEÑA</button>
        </form>
    </div>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="js/security.js"></script>
    <script src="js/config.js"></script>
    <script>
        const API_BASE = API_CONFIG.baseUrl;

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            const notif = document.getElementById('notification');

            if (!token) {
                showNotif('Token no válido o ausente.', true);
                return;
            }

            if (password !== confirm) {
                showNotif('Las contraseñas no coinciden.', true);
                return;
            }

            if (password.length < 8) {
                showNotif('La contraseña debe tener al menos 8 caracteres.', true);
                return;
            }

            try {
                const res = await secureFetch(`${API_BASE}/reset_password.php`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (data.ok) {
                    showNotif('✅ ' + data.msg);
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 2000);
                } else {
                    showNotif('❌ ' + data.msg, true);
                }
            } catch (err) {
                showNotif('Error de conexión.', true);
            }
        });

        function showNotif(msg, isError = false) {
            const notif = document.getElementById('notification');
            notif.textContent = msg;
            notif.className = isError ? 'notification error' : 'notification success';
            setTimeout(() => { notif.className = 'notification'; }, 4000);
        }
    </script>
</body>

</html>
